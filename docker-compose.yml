version: '3.8'

services:
  mysql-db:
    image: mysql:8.0
    container_name: healthcare-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: healthcare_db
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 10s
      retries: 5

  consul:
    image: hashicorp/consul:1.15
    container_name: healthcare-consul
    ports:
      - "8500:8500"
    command: "agent -dev -client=0.0.0.0"

  config-server:
    build: ./config-server
    container_name: config-server
    ports:
      - "8888:8888"
    depends_on:
      - consul
    # ON AJOUTE CECI : Docker va tester si le port 8888 répond
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  patient-service:
    build: ./patient-service
    container_name: patient-service
    ports:
      - "8081:8081"
    depends_on:
      mysql-db:
        condition: service_healthy
      config-server:
        condition: service_healthy # Attendre que le config-server soit HEALTHY

  user-service:
    build: ./user-service
    container_name: user-service
    ports:
      - "8082:8082"
    depends_on:
      mysql-db:
        condition: service_healthy
      config-server:
        condition: service_healthy # Attendre que le config-server soit HEALTHY

volumes:
  mysql_data: