<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mon Planning - Healthcare</title>
    <!-- J'appelle mon ADN commun et mon style planning pro -->
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/planning.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<!-- MA VITRE PRINCIPALE (Format 850px Compact) -->
<div class="glass-card glass-card-planning">

    <h2 style="font-size: 1.5rem; margin-bottom: 20px; letter-spacing: 1px;">
        <i class="fa-solid fa-calendar-check" style="color: var(--medical-green); margin-right: 12px;"></i>
        Mon Planning
    </h2>

    <!-- MON FORMULAIRE D'AJOUT (Style Glassmorphism intégré) -->
    <form th:action="@{/consultations/add}" th:object="${newAppointment}" method="post" class="quick-add-box">

        <div>
            <label>Patient</label>
            <select th:field="*{patientId}" class="form-control" style="background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); padding-left: 10px;" required>
                <option value="">Sélectionner...</option>
                <option th:each="p : ${patients}" th:value="${p.id}" th:text="${p.lastName.toUpperCase() + ' ' + p.firstName}"></option>
            </select>
        </div>

        <div>
            <label>Date & Heure</label>
            <input type="datetime-local" th:field="*{dateTime}" class="form-control" style="background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); padding: 0 10px;" required />
        </div>

        <div>
            <label>Motif de visite</label>
            <input type="text" th:field="*{reason}" class="form-control" style="background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); padding: 0 10px;" placeholder="Ex: Contrôle" required />
        </div>

        <button type="submit" class="btn-primary" style="height: 40px; padding: 0 20px; font-size: 0.7rem;">
            <i class="fa-solid fa-plus"></i> AJOUTER
        </button>
    </form>

    <!-- MON AGENDA (Timeline) -->
    <div class="agenda-scroll">

        <!-- Cas : Liste vide -->
        <div th:if="${#lists.isEmpty(appointments)}" style="text-align: center; padding: 40px; opacity: 0.5;">
            <i class="fa-solid fa-calendar-day" style="font-size: 3rem; margin-bottom: 10px;"></i>
            <p>Aucune consultation aujourd'hui.</p>
        </div>

        <!-- Cas : On a des rendez-vous -->
        <div th:each="a : ${appointments}" class="appointment-card">

            <!-- HEURE ET DATE -->
            <div class="time-block">
                <div class="time-hour" th:text="${#temporals.format(a.dateTime, 'HH:mm')}">14:00</div>
                <div class="time-date" th:text="${#temporals.format(a.dateTime, 'dd MMM')}">04 JUIN</div>
            </div>

            <!-- INFOS PATIENT -->
            <div class="info-block">
                <p class="patient-name" th:text="${a.patientName}">NOM Prénom</p>
                <span class="visit-reason">
                    <i class="fa-solid fa-stethoscope"></i> <span th:text="${a.reason}">Consultation</span>
                </span>
            </div>

            <!-- ACTIONS -->
            <div class="action-icons">
                <a th:href="@{'/patients/notes/' + ${a.patientId}}" title="Dossier Médical">
                    <i class="fa-solid fa-folder-open btn-icon icon-folder"></i>
                </a>
                <a th:href="@{'/consultations/delete/' + ${a.id}}" onclick="return confirm('Annuler ce RDV ?')" title="Annuler">
                    <i class="fa-solid fa-circle-xmark btn-icon icon-cancel"></i>
                </a>
            </div>
        </div>

    </div>

    <!-- RETOUR -->
    <div class="back-footer">
        <a href="/home" class="btn-primary" style="background: none; border: 1px solid var(--glass-border); font-size: 0.65rem; width: auto; padding: 8px 20px;">
            <i class="fa-solid fa-chevron-left"></i> RETOUR AU TABLEAU DE BORD
        </a>
    </div>
</div>

</body>
</html>
