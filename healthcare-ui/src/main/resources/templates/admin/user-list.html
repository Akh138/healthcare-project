<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestion Médecins - Admin</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body style="display: flex; flex-direction: column; align-items: center; padding-top: 50px;">

<div class="container-large">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <div>
            <h2 style="text-align: left; margin: 0;">Gestion des Utilisateurs</h2>
            <p style="color: var(--text-light); margin: 5px 0 0 0; font-size: 0.9rem;">Liste des médecins inscrits sur la plateforme</p>
        </div>
    </div>

    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th><i class="fa-solid fa-user-doctor"></i> Nom d'utilisateur</th>
            <th><i class="fa-solid fa-shield-halved"></i> Rôle</th>
            <th style="text-align: center;">Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="u : ${users}">
            <td th:text="${u.id}"></td>
            <td th:text="${u.username}" style="font-weight: 600;"></td>
            <td><span class="badge" th:text="${u.role}"></span></td>
            <td style="text-align: center;">
                <a th:href="@{'/admin/users/delete/' + ${u.id}}"
                   onclick="return confirm('Supprimer ce compte médecin ?')"
                   style="text-decoration: none;">
                    <i class="fa-solid fa-trash-can" style="color: #e74c3c;"></i>
                </a>
            </td>
        </tr>
        </tbody>
    </table>

    <div style="margin-top: 30px; border-top: 1px solid #f1f5f9; padding-top: 20px;">
        <a href="/home" style="text-decoration: none; color: var(--text-light); font-weight: 600; display: flex; align-items: center; gap: 8px;">
            <i class="fa-solid fa-arrow-left"></i> Retour au tableau de bord
        </a>
    </div>
</div>
</body>
</html>
