<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestion Patients - Admin</title>
    <!-- J'utilise mes fichiers CSS séparés : common pour l'ADN, patient-list pour le tableau -->
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/patient-list.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<!-- MA VITRE PRINCIPALE (Format Compact validé) -->
<div class="glass-card glass-card-large">

    <!-- EN-TÊTE AVEC ICONE MÉDICALE -->
    <div class="page-header">
        <h2><i class="fa-solid fa-users" style="color: var(--medical-green); margin-right: 8px;"></i>Gestion des Patients</h2>
        <p class="subtitle">Répertoire des patients enregistrés</p>
    </div>

    <!-- MES COMMANDES : J'ai intégré la recherche "Live" et le compteur total -->
    <div class="table-controls">
        <div class="search-wrapper">
            <i class="fa-solid fa-magnifying-glass" style="color: var(--medical-green);"></i>
            <input type="text" id="patientSearch" class="search-input" placeholder="Filtrer par nom...">
        </div>

        <div class="count-info">
            Total : <span th:text="${patients.size()}" style="color: var(--medical-green); font-weight: 700;">0</span> patients
        </div>
    </div>

    <!-- ZONE DU TABLEAU : J'ai ajouté un scroll interne pour la propreté -->
    <div class="table-responsive">
        <table id="patientTable">
            <thead>
            <tr>
                <th>Patient</th>
                <th>Genre</th>
                <th>Naissance</th>
                <th>Médecin</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <!-- Boucle Thymeleaf pour charger les patients de la BDD -->
            <tr th:each="p : ${patients}">
                <td class="patient-identity" style="font-weight: 600;">
                    <span th:text="${p.lastName.toUpperCase() + ' ' + p.firstName}">NOM Prenom</span>
                </td>
                <td th:text="${p.gender}">F</td>
                <td th:text="${p.birthday}" style="opacity: 0.6;">1995-02-16</td>
                <td>
                    <span class="doctor-badge">
                        <i class="fa-solid fa-stethoscope" style="opacity: 0.5; font-size: 0.6rem;"></i>
                        <span th:text="${p.doctorUsername}">Docteur</span>
                    </span>
                </td>
                <td>
                    <!-- Bouton Voir le dossier avec effet zoom au survol -->
                    <a th:href="@{/admin/patient/details/{id}(id=${p.id})}" class="btn-view">
                        <i class="fa-solid fa-eye"></i>
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- LIEN DE RETOUR AU DASHBOARD -->
    <div class="back-footer">
        <a href="/home" class="btn-back">
            <i class="fa-solid fa-chevron-left"></i> Retour au tableau de bord
        </a>
    </div>
</div>

<!-- MON FILTRE JAVASCRIPT : Recherche instantanée sans recharger la page (Effet Expert) -->
<script>
    document.getElementById('patientSearch').addEventListener('keyup', function() {
        let filter = this.value.toLowerCase();
        let rows = document.querySelectorAll('#patientTable tbody tr');
        rows.forEach(row => {
            let name = row.querySelector('.patient-identity').textContent.toLowerCase();
            row.style.display = name.includes(filter) ? "" : "none";
        });
    });
</script>

</body>
</html>
