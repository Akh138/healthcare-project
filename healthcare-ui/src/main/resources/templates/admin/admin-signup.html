<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription Staff - Admin</title>
    <!-- J'utilise mes deux fichiers CSS pour garder une structure pro -->
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/admin-signup.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<!-- MA CARTE VERSION COMPACTE (Le contour sera enfin visible !) -->
<div class="glass-card glass-card-signup">

    <!-- MON LOGO MÉDICAL -->
    <div class="brand-icon">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="width: 28px; height: 28px;">
            <path d="M2 12H5L8 20L12 4L15 15L17 12H22" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </div>

    <h2>Inscription Staff</h2>
    <p class="subtitle">Espace réservé à l'administration</p>

    <form th:action="@{/admin/signup}" th:object="${user}" method="post" class="form-signup">

        <!-- 1. NOM D'UTILISATEUR -->
        <div class="input-group">
            <label>NOM D'UTILISATEUR</label>
            <i class="fa-solid fa-user"></i>
            <input type="text" th:field="*{username}" class="form-control" placeholder="Ex: Dr. Martin" required />
        </div>

        <!-- 2. MOT DE PASSE PROVISOIRE -->
        <div class="input-group">
            <label>MOT DE PASSE PROVISOIRE</label>
            <i class="fa-solid fa-lock"></i>
            <input type="password" th:field="*{password}" class="form-control" placeholder="••••••••" required />
        </div>

        <!-- 3. ATTRIBUTION DU RÔLE -->
        <div class="input-group">
            <label>ATTRIBUER UN RÔLE</label>
            <i class="fa-solid fa-id-card-clip"></i>
            <select th:field="*{role}" class="form-control" required>
                <option value="DOCTOR">Médecin (DOCTOR)</option>
                <option value="ADMIN">Administrateur (ADMIN)</option>
            </select>
        </div>

        <!-- BOUTON DE VALIDATION -->
        <button type="submit" class="btn-primary btn-submit">
            <i class="fa-solid fa-user-plus"></i> VALIDER LA CRÉATION
        </button>
    </form>

    <div class="back-footer">
        <a href="/home" class="btn-back">
            <i class="fa-solid fa-chevron-left"></i> Annuler et retourner
        </a>
    </div>
</div>

</body>
</html>
