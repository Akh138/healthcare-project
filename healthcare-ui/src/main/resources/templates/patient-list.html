<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Patients - Healthcare</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body style="display: flex; flex-direction: column; align-items: center; padding-top: 50px;">

<div class="container-large">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <div>
            <h2 style="text-align: left; margin: 0;">Répertoire des Patients</h2>
            <p style="color: var(--text-light); margin: 5px 0 0 0; font-size: 0.9rem;">Consultez et gérez les dossiers patients</p>
        </div>
        <a th:if="${patients != null}" href="/patients/add" class="btn-primary" style="width: auto; padding: 12px 24px;">
            <i class="fa-solid fa-user-plus"></i> Nouveau Patient
        </a>
    </div>

    <!-- CAS DE PANNE -->
    <div th:if="${patients == null}" style="background-color: #fee2e2; color: #b91c1c; padding: 30px; border-radius: 15px; text-align: center; border: 1px solid #fecaca; margin: 20px 0;">
        <i class="fa-solid fa-triangle-exclamation" style="font-size: 2.5rem; margin-bottom: 10px;"></i>
        <p><strong>Service en maintenance</strong>. Injoignable pour le moment.</p>
    </div>

    <!-- CAS VIDE -->
    <div th:if="${patients != null && patients.isEmpty()}" style="background-color: #f8fafc; color: #64748b; padding: 50px; border-radius: 15px; text-align: center; border: 2px dashed #e2e8f0; margin: 20px 0;">
        <i class="fa-solid fa-folder-open" style="font-size: 2.5rem; margin-bottom: 15px; opacity: 0.5;"></i>
        <p>Aucun patient enregistré.</p>
    </div>

    <!-- CAS NORMAL (TABLEAU) -->
    <table th:if="${patients != null && !patients.isEmpty()}">
        <thead>
        <tr>
            <th>Identité</th>
            <th>Genre</th>
            <th>Naissance</th>
            <th>Email</th>
            <th>Téléphone</th>
            <th style="text-align: center;">Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="p : ${patients}">
            <td><div style="font-weight: 700; color: var(--text-main);" th:text="${p.lastName.toUpperCase() + ' ' + p.firstName}"></div></td>
            <td><span class="badge" th:text="${p.gender}"></span></td>
            <td th:text="${p.birthday}"></td>
            <td th:text="${p.email != null ? p.email : '-'}"></td>
            <td th:text="${p.phone != null ? p.phone : '-'}"></td>
            <td style="text-align: center; display: flex; gap: 15px; justify-content: center;">

                <!-- BOUTON MODIFIER -->
                <a th:href="@{'/patients/edit/' + ${p.id}}" style="text-decoration: none;">
                    <i class="fa-solid fa-pen-to-square" style="color: #f39c12; cursor: pointer;" title="Modifier"></i>
                </a>

                <!-- BOUTON SUPPRIMER -->
                <a th:href="@{'/patients/delete/' + ${p.id}}"
                   onclick="return confirm('Supprimer définitivement ce patient ?')"
                   style="text-decoration: none;">
                    <i class="fa-solid fa-trash" style="color: #e74c3c; cursor: pointer;" title="Supprimer"></i>
                </a>

            </td>
        </tr>
        </tbody>
    </table>

    <div style="margin-top: 30px; border-top: 1px solid #f1f5f9; padding-top: 20px;">
        <a href="/home" style="text-decoration: none; color: var(--text-light); font-weight: 600; display: flex; align-items: center; gap: 8px;">
            <i class="fa-solid fa-arrow-left"></i> Retour au tableau de bord
        </a>
    </div>
</div>
</body>
</html>
