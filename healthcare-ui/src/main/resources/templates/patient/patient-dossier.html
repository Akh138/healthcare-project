<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dossier Médical - Healthcare</title>
    <!-- Mon style commun et mon style dossier avec finitions Expert -->
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/patient-dossier.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="glass-card glass-card-dossier">

    <!-- HEADER PATIENT HAUTE DÉFINITION -->
    <header class="patient-header-bar">
        <div class="profile-section">
            <div class="photo-avatar">
                <img th:if="${patient.profilePicture}" th:src="${patient.profilePicture}" alt="Photo">
                <i th:unless="${patient.profilePicture}" class="fa-solid fa-user-shield"></i>
            </div>
            <div class="patient-titles">
                <h1><span th:text="${patient.lastName.toUpperCase()}">NOM</span> <span th:text="${patient.firstName}">Prénom</span></h1>
                <span><i class="fa-solid fa-folder-open"></i> Dossier Clinique #<span th:text="${patient.id}">00</span></span>
            </div>
        </div>

        <div class="quick-stats">
            <div class="stat-item">
                <span class="stat-label">Naissance</span>
                <span class="stat-value" th:text="${patient.birthday}">-</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Genre</span>
                <span class="stat-value" th:text="${patient.gender}">-</span>
            </div>
            <div class="stat-item" style="border-right: none;">
                <span class="stat-label">Statut</span>
                <span class="stat-value" style="color: var(--medical-green);">● Actif</span>
            </div>
        </div>

        <a href="/patients" class="btn-nav-back"><i class="fa-solid fa-arrow-left"></i> Retour</a>
    </header>

    <div class="workspace">

        <!-- COLONNE 1 : COORDONNÉES AVEC ICÔNES ALIGNÉES -->
        <aside class="work-col">
            <div class="col-header"><i class="fa-solid fa-address-card"></i> Fiche Contact</div>

            <div class="contact-item">
                <i class="fa-solid fa-mobile-screen-button"></i>
                <div>
                    <span class="contact-label">Téléphone</span>
                    <span class="contact-value" th:text="${patient.phone}">-</span>
                </div>
            </div>

            <div class="contact-item">
                <i class="fa-solid fa-envelope-open-text"></i>
                <div>
                    <span class="contact-label">E-mail</span>
                    <span class="contact-value" th:text="${patient.email}" style="font-size: 0.8rem;">-</span>
                </div>
            </div>

            <div class="contact-item">
                <i class="fa-solid fa-map-location-dot"></i>
                <div>
                    <span class="contact-label">Adresse</span>
                    <span class="contact-value" th:text="${patient.address}" style="line-height: 1.4;">-</span>
                </div>
            </div>
        </aside>

        <!-- COLONNE 2 : HISTORIQUE -->
        <main class="work-col">
            <div class="col-header"><i class="fa-solid fa-stethoscope"></i> Journal Clinique</div>

            <div class="timeline-scroll">
                <div class="note-entry">
                    <form th:action="@{'/patients/notes/add/' + ${patient.id}}" th:object="${newNote}" method="post">
                        <textarea th:field="*{content}" placeholder="Saisir une observation clinique..." required style="height: 55px; width: 100%; background:none; border:none; color:white; outline:none; font-size: 0.85rem;"></textarea>
                        <div style="text-align: right; margin-top: 10px;">
                            <button type="submit" class="btn-primary" style="padding: 7px 20px; font-size: 0.7rem;">ENREGISTRER</button>
                        </div>
                    </form>
                </div>

                <!-- Liste des notes -->
                <div th:each="n : ${notes}" class="timeline-card">
                    <div class="note-bubble">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                            <span style="font-size: 0.7rem; font-weight: 900; color: var(--medical-green);" th:text="${n.doctorName}">DR</span>
                            <span style="font-size: 0.65rem; font-weight: 800; color: #0a192f;" th:text="${#temporals.format(n.date, 'dd/MM/yy HH:mm')}">DATE</span>
                        </div>
                        <p style="margin:0; font-size: 0.85rem; color: white;" th:text="${n.content}">Note...</p>
                        <a th:href="@{'/patients/notes/delete/' + ${n.id} + '/' + ${patient.id}}" style="display:block; text-align:right; color: #ef4444; font-size: 0.65rem; margin-top: 10px; opacity: 0.5;"><i class="fa-solid fa-trash"></i> Supprimer</a>
                    </div>
                </div>
            </div>
        </main>

        <!-- COLONNE 3 : MESSAGES -->
        <section class="work-col">
            <div class="col-header"><i class="fa-solid fa-comment-medical"></i> Messagerie</div>

            <div class="chat-messages">
                <div th:each="m : ${messages}" th:classappend="${m.senderName.startsWith('Dr.') ? 'msg-dr' : 'msg-pt'}" class="msg">
                    <div th:text="${m.content}">Message</div>
                </div>
            </div>

            <form th:action="@{'/patients/messages/add/' + ${patient.id}}" th:object="${newMessage}" method="post" style="background: rgba(0,0,0,0.3); border-radius: 12px; padding: 10px; margin-top: 15px; display: flex; gap: 10px; border: 1px solid rgba(255,255,255,0.1);">
                <input type="text" th:field="*{content}" placeholder="Message..." required style="background:none; border:none; color:white; outline:none; font-size: 0.8rem; width:100%;">
                <button type="submit" style="background:none; border:none; color: var(--medical-green); cursor:pointer;"><i class="fa-solid fa-paper-plane"></i></button>
            </form>
        </section>

    </div>
</div>

</body>
</html>
