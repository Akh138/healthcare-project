<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Demandes d'inscription - Healthcare</title>
    <!-- J'appelle ma base et mon style spécifique aux demandes -->
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/requests.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<!-- MA CARTE PRINCIPALE (Format Compact validé) -->
<div class="glass-card glass-card-large">

    <div class="page-header">
        <h2><i class="fa-solid fa-user-plus" style="color: var(--medical-green); margin-right: 10px;"></i>Demandes d'inscription</h2>
        <p class="subtitle">Nouveaux patients en attente de création de dossier</p>
    </div>

    <!-- CAS 1 : AUCUNE DEMANDE (Zéro State élégant) -->
    <div th:if="${#lists.isEmpty(requests)}" class="empty-state">
        <i class="fa-solid fa-circle-check"></i>
        <p>Toutes les demandes ont été traitées.</p>
    </div>

    <!-- CAS 2 : LISTE DES DEMANDES -->
    <div th:if="${!#lists.isEmpty(requests)}">

        <!-- Petit compteur en haut du tableau -->
        <div style="text-align: right; margin-bottom: 10px; font-size: 0.7rem; color: var(--text-dim);">
            En attente : <span th:text="${requests.size()}" style="color: var(--medical-green); font-weight: 700;">0</span>
        </div>

        <div class="table-responsive">
            <table id="requestTable">
                <thead>
                <tr>
                    <th>INSCRIPTION</th>
                    <th>PSEUDO PATIENT</th>
                    <th>EMAIL</th>
                    <th>ACTION</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="p : ${requests}">
                    <td th:text="${p.birthday}" style="opacity: 0.7;">Date</td>
                    <td style="font-weight: 600;">
                        <i class="fa-solid fa-user-tag" style="margin-right: 8px; opacity: 0.4; font-size: 0.7rem;"></i>
                        <span th:text="${p.firstName}">Pseudo</span>
                    </td>
                    <td th:text="${p.email}" style="font-size: 0.7rem; opacity: 0.8;">email@test.com</td>
                    <td>
                        <!-- Bouton de validation style pro -->
                        <a th:href="@{'/patients/validate/' + ${p.id}}" class="btn-validate">
                            <i class="fa-solid fa-address-card"></i> CRÉER FICHE
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- PIED DE PAGE -->
    <div class="back-footer">
        <a href="/home" class="btn-back">
            <i class="fa-solid fa-chevron-left"></i> Retour au tableau de bord
        </a>
    </div>
</div>

</body>
</html>
