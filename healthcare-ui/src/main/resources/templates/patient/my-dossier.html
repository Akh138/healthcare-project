<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mon Dossier - Healthcare</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { height: 100vh; overflow: hidden; display: flex; justify-content: center; padding-top: 50px; }
        .grid-container { display: grid; grid-template-columns: 350px 1fr; gap: 20px; width: 98%; max-width: 1400px; height: 85vh; }
        .card-dossier { background: #fff; padding: 25px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); display: flex; flex-direction: column; overflow: hidden; }

        /* --- EN-TÊTE ALIGNÉ : LOGO GAUCHE | PHOTO DROITE --- */
        .patient-header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 20px;
        }

        /* Redimensionnement du logo pour matcher la photo (70x70) */
        .brand-icon-profile {
            width: 70px; height: 70px;
            background: var(--primary-blue);
            border-radius: 15px;
            display: flex; justify-content: center; align-items: center;
            color: white;
            animation: heartBeat 2s infinite;
            box-shadow: 0 8px 20px rgba(37, 117, 252, 0.2);
        }

        /* Carré Photo (Même taille : 70x70) */
        .photo-upload-box {
            width: 70px; height: 70px;
            border: 2px dashed #cbd5e1; border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; overflow: hidden; background: #f8fafc; transition: 0.3s;
        }
        .photo-upload-box img { width: 100%; height: 100%; object-fit: cover; }

        .scrollable { flex-grow: 1; overflow-y: auto; padding-right: 10px; }
        h2, h3 { text-align: center; color: var(--text-main); }
        .message-item { padding: 10px 15px; border-radius: 15px; max-width: 80%; font-size: 0.85rem; margin-bottom: 8px; }
        .message-doctor { background: var(--primary-blue); color: white; align-self: flex-start; }
        .message-patient { background: #f1f5f9; align-self: flex-end; }
    </style>
</head>
<body>

<div class="grid-container" th:if="${patient != null}">

    <!-- GAUCHE : PROFIL -->
    <aside class="card-dossier">
        <div class="patient-header-top">
            <!-- 1. Logo à gauche (70x70) -->
            <div class="brand-icon-profile">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="width: 40px; height: 40px;">
                    <path d="M2 12H5L8 20L12 4L15 15L17 12H22" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>

            <!-- 2. Photo à droite (70x70) -->
            <div class="photo-upload-box" onclick="document.getElementById('fileInput').click()">
                <img th:if="${patient.profilePicture}" th:src="${patient.profilePicture}" />
                <i th:unless="${patient.profilePicture}" class="fa-solid fa-camera" style="color: #94a3b8;"></i>
            </div>
        </div>

        <!-- Titres centrés au milieu -->
        <h2 th:text="${patient.lastName.toUpperCase() + ' ' + patient.firstName}" style="margin: 0; font-size: 1.2rem;"></h2>
        <p class="subtitle" style="margin-top: 5px;">Espace Patient Personnel</p>

        <form id="photoForm" th:action="@{/my-dossier/upload-photo}" method="post" style="display: none;">
            <input type="file" id="fileInput" accept="image/*" onchange="uploadImage(this)">
            <input type="hidden" name="photo" id="photoData">
        </form>

        <hr style="border: 0; border-top: 1px solid #f1f5f9; margin: 20px 0;">
        <div style="font-size: 0.9rem; line-height: 2.5; padding: 0 10px;">
            <p><i class="fa-solid fa-cake-candles" style="color: var(--primary-blue); width: 25px;"></i> <span th:text="${patient.birthday}"></span></p>
            <p><i class="fa-solid fa-envelope" style="color: var(--primary-blue); width: 25px;"></i> <span th:text="${patient.email}"></span></p>
        </div>
        <div style="margin-top: auto; text-align: center;"><a href="/logout" style="color: #ef4444; text-decoration: none; font-weight: 700;">DÉCONNEXION</a></div>
    </aside>

    <!-- DROITE : CONTENU -->
    <main class="card-dossier">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px; height: 100%;">
            <section style="display: flex; flex-direction: column;">
                <h3><i class="fa-solid fa-file-medical"></i> COMPTE-RENDUS</h3>
                <div class="scrollable">
                    <div th:each="n : ${notes}" style="background: #f8fafc; padding: 15px; border-radius: 12px; margin-bottom: 10px; border-left: 4px solid var(--primary-blue);">
                        <small th:text="${#temporals.format(n.date, 'dd/MM/yyyy')}"></small>
                        <p th:text="${n.content}" style="margin: 5px 0 0 0;"></p>
                    </div>
                </div>
            </section>

            <section style="display: flex; flex-direction: column;">
                <h3><i class="fa-solid fa-comments"></i> DISCUSSION</h3>
                <div class="scrollable" style="display: flex; flex-direction: column;">
                    <div th:each="m : ${messages}" th:classappend="${m.senderName.startsWith('Dr.') ? 'message-doctor' : 'message-patient'}" class="message-item">
                        <div th:text="${m.content}"></div>
                    </div>
                </div>
                <form th:action="@{/my-dossier/message}" th:object="${newMessage}" method="post" style="margin-top: 15px; display: flex; gap: 5px;">
                    <input type="text" th:field="*{content}" class="form-control" style="padding-left: 15px;" placeholder="Répondre..." required>
                    <button type="submit" class="btn-primary" style="width: 50px;"><i class="fa-solid fa-paper-plane"></i></button>
                </form>
            </section>
        </div>
    </main>
</div>

<!-- SECTION EXPLICATION JAVASCRIPT (À LIRE POUR TON PROF) -->
<script>
    function uploadImage(input) {
        // 1. On vérifie si l'utilisateur a bien choisi un fichier
        if (input.files && input.files[0]) {

            // 2. On crée un lecteur de fichier (objet standard du navigateur)
            var reader = new FileReader();

            // 3. On définit ce qui se passe UNE FOIS que le fichier est lu
            reader.onload = function(e) {
                // On place le résultat (le texte de l'image) dans notre champ caché
                document.getElementById('photoData').value = e.target.result;
                // On envoie automatiquement le formulaire vers le contrôleur Java
                document.getElementById('photoForm').submit();
            };

            // 4. On lance la lecture de l'image pour la convertir en texte (DataURL / Base64)
            reader.readAsDataURL(input.files[0]);
        }
    }
</script>
</body>
</html>
