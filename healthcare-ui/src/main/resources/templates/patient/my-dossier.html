<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mon Dossier - Healthcare</title>
    <!-- ADN Commun + Style Patient Pro Master -->
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/my-dossier.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="glass-card glass-card-patient" th:if="${patient != null}">

    <!-- SIDEBAR DE PROFIL -->
    <aside class="sidebar-profile">
        <div class="header-icons">
            <div class="brand-mini">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="width: 30px; height: 30px;">
                    <path d="M2 12H5L8 20L12 4L15 15L17 12H22" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>

            <div class="photo-upload" onclick="document.getElementById('fileInput').click()" title="Changer ma photo">
                <img th:if="${patient.profilePicture}" th:src="${patient.profilePicture}" alt="Photo"/>
                <i th:unless="${patient.profilePicture}" class="fa-solid fa-camera" style="color: var(--text-dim); font-size: 1.1rem;"></i>
            </div>
        </div>

        <h2 class="patient-name" th:text="${patient.lastName.toUpperCase() + ' ' + patient.firstName}">NOM Prenom</h2>
        <p class="patient-badge">Espace Patient Personnel</p>

        <!-- Formulaire photo caché -->
        <form id="photoForm" th:action="@{/my-dossier/upload-photo}" method="post" style="display: none;">
            <input type="file" id="fileInput" accept="image/*" onchange="uploadImage(this)">
            <input type="hidden" name="photo" id="photoData">
        </form>

        <div class="info-box">
            <div>
                <span class="info-label">Ma Date de Naissance</span>
                <span class="info-value"><i class="fa-solid fa-cake-candles" style="color: #0a192f; margin-right: 8px;"></i> <span th:text="${patient.birthday}">-</span></span>
            </div>
            <div>
                <span class="info-label">Mon E-mail de contact</span>
                <span class="info-value"><i class="fa-solid fa-envelope" style="color: #0a192f; margin-right: 8px;"></i> <span th:text="${patient.email}">-</span></span>
            </div>
        </div>

        <!-- Bouton Déconnexion Premium -->
        <a href="/logout" class="btn-logout">
            <i class="fa-solid fa-power-off"></i> Déconnexion
        </a>
    </aside>

    <!-- ZONE PRINCIPALE -->
    <main class="main-workspace">

        <!-- DOCUMENTS -->
        <section class="workspace-col">
            <div class="col-header"><i class="fa-solid fa-folder-medical"></i> Compte-rendus médicaux</div>
            <div class="reports-scroll">
                <div th:each="n : ${notes}" class="report-item">
                    <span class="report-date" th:text="${'Consultation du ' + #temporals.format(n.date, 'dd/MM/yyyy')}">Date</span>
                    <p class="report-content" th:text="${n.content}">Contenu du rapport...</p>
                </div>
                <!-- État vide amélioré -->
                <div th:if="${#lists.isEmpty(notes)}" style="text-align: center; padding-top: 80px;">
                    <i class="fa-solid fa-box-open empty-icon"></i>
                    <p style="color: var(--text-dim); font-size: 0.9rem;">Aucun document disponible pour le moment.</p>
                </div>
            </div>
        </section>

        <!-- MESSAGERIE -->
        <section class="workspace-col">
            <div class="col-header"><i class="fa-solid fa-comment-dots"></i> Messagerie sécurisée</div>
            <div class="msg-scroll">
                <div th:each="m : ${messages}"
                     th:classappend="${m.senderName.startsWith('Dr.') ? 'bubble-dr' : 'bubble-pt'}"
                     class="bubble">
                    <div th:text="${m.content}">Message</div>
                </div>
            </div>

            <form th:action="@{/my-dossier/message}" th:object="${newMessage}" method="post" style="margin-top: 20px; display: flex; gap: 10px; background: rgba(0,0,0,0.3); padding: 12px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05);">
                <input type="text" th:field="*{content}" placeholder="Votre message au docteur..." required style="background:none; border:none; color:white; outline:none; font-size: 0.85rem; width: 100%;">
                <button type="submit" style="background:none; border:none; color: var(--medical-green); cursor:pointer; font-size: 1.1rem;"><i class="fa-solid fa-paper-plane"></i></button>
            </form>
        </section>
    </main>
</div>

<script>
    function uploadImage(input) {
        if (input.files && input.files[0]) {
            var reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('photoData').value = e.target.result;
                document.getElementById('photoForm').submit();
            };
            reader.readAsDataURL(input.files[0]);
        }
    }
</script>
</body>
</html>
