<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>En attente - Healthcare</title>
    <!-- J'utilise mon ADN commun et mon style d'attente spécifique -->
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/no-dossier.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<!-- MA CARTE VERSION GLASS (Pour rassurer le patient) -->
<div class="glass-card glass-card-waiting">

    <!-- MON ICÔNE D'ATTENTE ANIMÉE -->
    <div class="wait-icon-box">
        <i class="fa-solid fa-clock-rotate-left"></i>
    </div>

    <h2>Dossier en attente</h2>
    <p class="subtitle">Bonjour <b><span th:text="${#authentication.name}">Pseudo</span></b> ! <br>Votre compte a bien été créé.</p>

    <!-- MON MESSAGE D'INFORMATION ÉPURÉ -->
    <div class="info-box-glass">
        <p class="info-text">
            <i class="fa-solid fa-shield-halved"></i>
            Votre inscription est actuellement en cours de vérification.
            Dès que votre médecin aura initialisé votre dossier médical,
            vous recevrez un accès complet à votre espace santé.
        </p>
    </div>

    <!-- LIEN DE SORTIE SÉCURISÉ -->
    <div class="footer-link">
        <a href="/logout" class="btn-logout-wait">
            <i class="fa-solid fa-power-off"></i> Se déconnecter
        </a>
    </div>
</div>

</body>
</html>
