<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Modifier Patient - Healthcare</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<div class="container-card" style="max-width: 550px;">
    <div class="brand-icon">
        <i class="fa-solid fa-user-pen"></i>
    </div>

    <h2>Modifier le Dossier</h2>
    <p class="subtitle">Mise à jour des informations patient</p>

    <form th:action="@{'/patients/update/' + ${patient.id}}" th:object="${patient}" method="post">

        <!-- --- RÉPARATION : ON GARDE LES INFOS CRUCIALES CACHÉES --- -->
        <!-- On garde l'ID pour savoir qui on modifie -->
        <input type="hidden" th:field="*{id}" />

        <!-- TRÈS IMPORTANT : On garde le pseudo du patient pour ne pas l'effacer en base ! -->
        <input type="hidden" th:field="*{patientUsername}" />

        <!-- On garde aussi le médecin et la photo pour pas qu'ils disparaissent -->
        <input type="hidden" th:field="*{doctorUsername}" />
        <input type="hidden" th:field="*{profilePicture}" />
        <!-- ------------------------------------------------------- -->

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div class="input-group">
                <label>Nom</label>
                <i class="fa-solid fa-id-card"></i>
                <input type="text" th:field="*{lastName}" class="form-control" required />
            </div>
            <div class="input-group">
                <label>Prénom</label>
                <i class="fa-solid fa-user"></i>
                <input type="text" th:field="*{firstName}" class="form-control" required />
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div class="input-group">
                <label>Date de Naissance</label>
                <i class="fa-solid fa-calendar-days"></i>
                <input type="date" th:field="*{birthday}" class="form-control" required />
            </div>
            <div class="input-group">
                <label>Genre</label>
                <i class="fa-solid fa-venus-mars"></i>
                <select th:field="*{gender}" class="form-control" style="padding-left: 45px;">
                    <option value="M">Masculin</option>
                    <option value="F">Féminin</option>
                </select>
            </div>
        </div>

        <div class="input-group">
            <label>Email</label>
            <i class="fa-solid fa-envelope"></i>
            <input type="email" th:field="*{email}" class="form-control" required />
        </div>

        <div class="input-group">
            <label>Téléphone</label>
            <i class="fa-solid fa-phone"></i>
            <input type="text" th:field="*{phone}" class="form-control" required />
        </div>

        <div class="input-group">
            <label>Adresse</label>
            <i class="fa-solid fa-location-dot"></i>
            <input type="text" th:field="*{address}" class="form-control" required />
        </div>

        <button type="submit" class="btn-primary">ENREGISTRER LES MODIFICATIONS</button>
    </form>

    <div class="footer-link">
        <a href="/patients" style="color: var(--text-light);">Annuler</a>
    </div>
</div>
</body>
</html>
