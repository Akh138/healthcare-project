<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modifier Patient - Healthcare</title>
    <!-- J'utilise ma base et mon style spécifique avec le gap corrigé -->
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/patient-update.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<!-- MA CARTE VERSION ULTRA-COMPACTE -->
<div class="glass-card glass-card-update">

    <div class="brand-icon">
        <i class="fa-solid fa-user-pen"></i>
    </div>

    <h2>Modifier le Dossier</h2>
    <p class="subtitle">Mise à jour des informations patient</p>

    <form th:action="@{'/patients/update/' + ${patient.id}}" th:object="${patient}" method="post">

        <!-- SÉCURITÉ : Champs cachés pour le backend -->
        <input type="hidden" th:field="*{id}" />
        <input type="hidden" th:field="*{patientUsername}" />
        <input type="hidden" th:field="*{doctorUsername}" />
        <input type="hidden" th:field="*{profilePicture}" />

        <!-- MA GRILLE AVEC ESPACEMENT CORRIGÉ : NOM ET PRÉNOM -->
        <div class="input-grid">
            <div class="input-group">
                <label>Nom de famille</label>
                <i class="fa-solid fa-id-card"></i>
                <input type="text" th:field="*{lastName}" class="form-control" required />
            </div>
            <div class="input-group">
                <label>Prénom</label>
                <i class="fa-solid fa-user"></i>
                <input type="text" th:field="*{firstName}" class="form-control" required />
            </div>
        </div>

        <!-- MA GRILLE AVEC ESPACEMENT CORRIGÉ : NAISSANCE ET GENRE -->
        <div class="input-grid">
            <div class="input-group">
                <label>Date de Naissance</label>
                <i class="fa-solid fa-calendar-days"></i>
                <input type="date" th:field="*{birthday}" class="form-control" required />
            </div>
            <div class="input-group">
                <label>Genre</label>
                <i class="fa-solid fa-venus-mars"></i>
                <select th:field="*{gender}" class="form-control">
                    <option value="M">Masculin (M)</option>
                    <option value="F">Féminin (F)</option>
                </select>
            </div>
        </div>

        <!-- CHAMPS PLEINE LARGEUR -->
        <div class="input-group">
            <label>Email de contact</label>
            <i class="fa-solid fa-envelope"></i>
            <input type="email" th:field="*{email}" class="form-control" required />
        </div>

        <div class="input-group">
            <label>Numéro de téléphone</label>
            <i class="fa-solid fa-phone"></i>
            <input type="text" th:field="*{phone}" class="form-control" required />
        </div>

        <div class="input-group">
            <label>Adresse postale</label>
            <i class="fa-solid fa-location-dot"></i>
            <input type="text" th:field="*{address}" class="form-control" required />
        </div>

        <!-- BOUTON DE VALIDATION -->
        <button type="submit" class="btn-primary btn-save">
            <i class="fa-solid fa-floppy-disk"></i> ENREGISTRER LES MODIFICATIONS
        </button>
    </form>

    <div class="back-footer">
        <a href="/patients" class="btn-cancel">
            <i class="fa-solid fa-xmark"></i> Annuler et quitter
        </a>
    </div>
</div>

</body>
</html>
