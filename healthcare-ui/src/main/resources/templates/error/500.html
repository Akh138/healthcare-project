<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erreur Serveur - Healthcare</title>
    <!-- J'utilise ma base commune et mon style d'erreur pour garder l'unité visuelle -->
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/error.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<!-- MA CARTE ERREUR GLASS (Format compact validé) -->
<div class="glass-card glass-card-error">

    <!-- MON ICÔNE TECHNIQUE ANIMÉE -->
    <div class="error-icon-box">
        <i class="fa-solid fa-microchip"></i>
    </div>

    <!-- CODE ERREUR GÉANT AVEC LUEUR -->
    <h1 class="error-code">500</h1>
    <h2>Erreur Interne</h2>

    <p class="subtitle">
        Une anomalie technique est survenue sur nos serveurs. <br>
        <b>Nos techniciens sont déjà sur le coup pour rétablir le service.</b>
    </p>

    <!-- BOUTON DE RETOUR SÉCURISÉ -->
    <div class="back-footer">
        <a href="/home" class="btn-primary btn-home">
            <i class="fa-solid fa-house-medical"></i> RETOUR AU DASHBOARD
        </a>
    </div>
</div>

</body>
</html>
