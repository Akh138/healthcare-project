<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dossier Médical - Healthcare</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Bloquer le scroll de la page entière */
        body {
            height: 100vh;
            overflow: hidden;
            padding: 20px 0;
            box-sizing: border-box;
        }

        .grid-container {
            display: grid;
            grid-template-columns: 350px 1fr 350px;
            gap: 20px;
            width: 98%;
            max-width: 1550px;
            height: 90vh; /* Aligne les 3 colonnes à la même hauteur */
        }

        .card-dossier {
            background: #fff;
            padding: 25px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- EN-TÊTE PATIENT : LOGO | NOM | PHOTO --- */
        .patient-header-top {
            display: flex;
            justify-content: space-between; /* Écarte le nom et la photo */
            align-items: flex-start;
            margin-bottom: 20px;
        }

        .identity-block {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-icon-small {
            width: 45px; height: 45px;
            background-color: var(--primary-blue);
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            flex-shrink: 0;
            animation: heartBeat 2s infinite ease-in-out;
        }

        /* LE PETIT CARRÉ PHOTO À DROITE */
        .photo-square {
            width: 65px;
            height: 65px;
            background-color: #f8fafc;
            border: 2px dashed #cbd5e1;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #94a3b8;
            font-size: 0.6rem;
            text-align: center;
            flex-shrink: 0;
        }

        /* Zones de défilement internes */
        .scrollable-content {
            flex-grow: 1;
            overflow-y: auto;
            padding-right: 8px;
        }

        /* Scrollbar élégante */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }

        .note-item {
            background: #f8fafc;
            border-left: 4px solid var(--primary-blue);
            padding: 15px;
            border-radius: 0 12px 12px 0;
            margin-bottom: 12px;
            position: relative;
        }

        .delete-note-btn {
            position: absolute; top: 10px; right: 10px;
            color: #fca5a5; cursor: pointer;
        }

        .message-item {
            padding: 10px 15px; border-radius: 15px;
            max-width: 85%; font-size: 0.85rem; margin-bottom: 8px;
        }
        .message-doctor { background: #f1f5f9; align-self: flex-end; }
        .message-patient { background: var(--primary-blue); color: white; align-self: flex-start; }
    </style>
</head>
<body style="display: flex; justify-content: center;">

<div class="grid-container">

    <!-- COLONNE 1 : FICHE PATIENT (MySQL) -->
    <aside class="card-dossier">
        <div class="patient-header-top">
            <!-- Gauche : Logo + Nom -->
            <div class="identity-block">
                <div class="brand-icon">
                    <!-- Icône Pouls Médical Moderne -->
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="width: 45px; height: 45px;">
                        <path d="M2 12H5L8 20L12 4L15 15L17 12H22" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <div>
                    <h3 th:text="${patient.lastName.toUpperCase()}" style="margin: 0; font-size: 1.1rem; line-height: 1.2;"></h3>
                    <p th:text="${patient.firstName}" style="margin: 0; color: var(--text-light); font-size: 0.9rem;"></p>
                </div>
            </div>

            <!-- Droite : Petit carré Photo -->
            <div class="photo-square">
                <i class="fa-solid fa-camera"></i>
            </div>
        </div>

        <hr style="border: 0; border-top: 1px solid #f1f5f9; margin-bottom: 20px;">

        <!-- Informations détaillées -->
        <div style="display: flex; flex-direction: column; gap: 15px; font-size: 0.9rem;">
            <p><i class="fa-solid fa-calendar" style="width: 25px; color: var(--primary-blue);"></i> <span th:text="${patient.birthday}"></span></p>
            <p><i class="fa-solid fa-venus-mars" style="width: 25px; color: var(--primary-blue);"></i> <span th:text="${patient.gender}"></span></p>
            <p><i class="fa-solid fa-phone" style="width: 25px; color: var(--primary-blue);"></i> <span th:text="${patient.phone}"></span></p>
            <p><i class="fa-solid fa-envelope" style="width: 25px; color: var(--primary-blue);"></i> <span th:text="${patient.email}"></span></p>
            <p><i class="fa-solid fa-map-marker-alt" style="width: 25px; color: var(--primary-blue);"></i> <span th:text="${patient.address}"></span></p>
        </div>

        <div style="margin-top: auto;">
            <a href="/patients" class="footer-link" style="text-align: left;"><i class="fa-solid fa-arrow-left"></i> Retour Liste</a>
        </div>
    </aside>

    <!-- COLONNE 2 : OBSERVATIONS (MongoDB) -->
    <main class="card-dossier">
        <h2 style="text-align: center; font-size: 1.3rem;"><i class="fa-solid fa-notes-medical"></i> Observations</h2>

        <!-- Saisie de note -->
        <form th:action="@{'/patients/notes/add/' + ${patient.id}}" th:object="${newNote}" method="post" style="margin-bottom: 20px;">
            <textarea th:field="*{content}" class="form-control" style="height: 80px; padding-left: 15px; margin-bottom: 10px;" placeholder="Écrire une observation..." required></textarea>
            <button type="submit" class="btn-primary" style="padding: 10px 20px;">Enregistrer</button>
        </form>

        <!-- Historique avec scroll -->
        <div class="scrollable-content">
            <div th:each="n : ${notes}" class="note-item">
                <a th:href="@{'/patients/notes/delete/' + ${n.id} + '/' + ${patient.id}}" onclick="return confirm('Supprimer ?')" class="delete-note-btn">
                    <i class="fa-solid fa-trash-can"></i>
                </a>
                <div style="font-size: 0.75rem; font-weight: 700; margin-bottom: 5px;">
                    <span th:text="${n.doctorName}"></span>
                    <span style="color: var(--text-light); font-weight: 400; margin-left: 10px;" th:text="${#temporals.format(n.date, 'dd/MM/yyyy HH:mm')}"></span>
                </div>
                <p th:text="${n.content}" style="margin: 0; font-size: 0.9rem; color: #475569;"></p>
            </div>
        </div>
    </main>

    <!-- COLONNE 3 : DISCUSSION (MongoDB) -->
    <section class="card-dossier">
        <h2 style="text-align: center; font-size: 1.1rem;"><i class="fa-solid fa-comments"></i> Discussion</h2>

        <div class="scrollable-content" style="display: flex; flex-direction: column; gap: 8px;">
            <div th:each="m : ${messages}"
                 th:classappend="${m.senderName.startsWith('Dr.') ? 'message-doctor' : 'message-patient'}"
                 class="message-item">
                <div style="font-size: 0.6rem; font-weight: 700; opacity: 0.7;" th:text="${m.senderName}"></div>
                <div th:text="${m.content}"></div>
            </div>
        </div>

        <!-- Envoi de message -->
        <form th:action="@{'/patients/messages/add/' + ${patient.id}}" th:object="${newMessage}" method="post" style="margin-top: 15px;">
            <div style="display: flex; gap: 8px;">
                <input type="text" th:field="*{content}" class="form-control" style="padding-left: 15px; margin-bottom: 0;" placeholder="Message..." required>
                <button type="submit" class="btn-primary" style="width: 45px; margin-top: 0;"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </form>
    </section>

</div>

</body>
</html>
