<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accueil - Healthcare</title>
    <!-- J'appelle mes deux fichiers CSS pour l'organisation -->
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/home.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<!-- MA CARTE DASHBOARD (Format compact géré par home.css) -->
<div class="glass-card glass-card-home">

    <!-- MON LOGO MÉDICAL -->
    <div class="brand-icon-small">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M2 12H5L8 20L12 4L15 15L17 12H22" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </div>

    <!-- TITRE BIENVENUE : Nom en blanc pour plus de classe -->
    <h2 class="welcome-title">Bienvenue,<br>
        <span class="welcome-name" sec:authentication="name">Admin</span>
    </h2>

    <p class="subtitle">
        <i class="fa-solid fa-shield-check" style="color: var(--medical-green);"></i> Espace
        <span th:text="${#authentication.authorities[0].authority == 'ROLE_ADMIN' ? 'Administrateur' : 'Médical'}">Rôle</span>
    </p>

    <div class="menu-container">

        <!-- SECTION RÉSERVÉE À L'ADMINISTRATEUR -->
        <div sec:authorize="hasRole('ADMIN')" class="menu-container">
            <p class="admin-section-label">Administration du système</p>

            <a href="/admin/users" class="btn-nav btn-green-1">
                <i class="fa-solid fa-user-doctor"></i> Liste des Médecins
            </a>

            <a href="/admin/patients-all" class="btn-nav btn-green-2">
                <i class="fa-solid fa-users-gear"></i> Gestion des Patients
            </a>

            <a href="/admin/signup" class="btn-nav btn-green-3">
                <i class="fa-solid fa-user-plus"></i> Inscrire un compte
            </a>
        </div>

        <!-- SECTION RÉSERVÉE AUX DOCTEURS -->
        <div sec:authorize="hasRole('DOCTOR')" class="menu-container">
            <a href="/patients" class="btn-nav btn-green-1">
                <i class="fa-solid fa-hospital-user"></i> Gérer mes Patients
            </a>

            <a href="/patients/requests" class="btn-nav btn-green-2">
                <i class="fa-solid fa-clipboard-list"></i> Demandes d'inscription
            </a>

            <a href="/consultations" class="btn-nav btn-green-3">
                <i class="fa-solid fa-calendar-days"></i> Mon Planning
            </a>
        </div>

    </div>

    <!-- LIEN DE SORTIE -->
    <a href="/logout" class="logout-btn">
        <i class="fa-solid fa-power-off"></i> Se déconnecter
    </a>
</div>

</body>
</html>
