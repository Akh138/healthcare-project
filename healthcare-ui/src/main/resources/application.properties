# IDENTITE DU MICROSERVICE
spring.application.name=healthcare-ui
server.port=8080

# CONFIGURATION DU CONFIG SERVER
spring.cloud.config.enabled=true

# R\u00C9PARATION DOCKER : On utilise le nom du service 'config-server'
spring.config.import=optional:configserver:http://config-server:8888

spring.cloud.config.fail-fast=false
spring.cloud.openfeign.circuitbreaker.enabled=true

# R\u00C9PARATION DOCKER : On utilise le nom 'healthcare-consul'
spring.cloud.consul.host=healthcare-consul
spring.cloud.consul.port=8500