# ===============================================================
# CONFIGURATION POUR LES TESTS (H2 EN M\u00C9MOIRE)
# ===============================================================

# On utilise H2 au lieu de MySQL pour ne pas polluer nos vraies donn\u00E9es
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# On demande \u00E0 Hibernate de cr\u00E9er les tables automatiquement dans H2
spring.jpa.hibernate.ddl-auto=create-drop

# TR\u00C8S IMPORTANT : On d\u00E9sactive Consul et le Config Server pendant les tests
# Sinon les tests vont mettre 2 minutes \u00E0 se lancer ou vont \u00E9chouer
spring.cloud.consul.enabled=false
spring.cloud.config.enabled=false