# ===============================================================
# CONFIGURATION POUR MES TESTS NOSQL (MONGODB)
# ===============================================================

#  Je dis au simulateur d'utiliser la version 4.0.2 de MongoDB
de.flapdoodle.mongodb.embedded.version=4.0.2

# On utilise une base MongoDB temporaire en m\u00E9moire pour ne pas salir Docker
spring.data.mongodb.database=test_healthcare_notes

# TR\u00C8S IMPORTANT : On coupe la connexion aux serveurs de l'infrastructure
# Comme \u00E7a, mes tests passent m\u00EAme si je n'ai pas internet ou si Docker est coup\u00E9
spring.cloud.consul.enabled=false
spring.cloud.config.enabled=false

# On r\u00E9duit les logs pour mieux voir les r\u00E9sultats des tests
logging.level.org.springframework.data.mongodb=WARN