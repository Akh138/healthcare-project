# ===============================================================
# CONFIGURATION SP\u00C9CIALE POUR MES TESTS PATIENT
# ===============================================================

# Je demande \u00E0 Spring d'utiliser H2 au lieu de MySQL pour ne pas toucher \u00E0 ma vraie base
spring.datasource.url=jdbc:h2:mem:patientdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate va cr\u00E9er les tables des patients et rendez-vous tout seul dans H2
spring.jpa.hibernate.ddl-auto=create-drop

# JE COUPE CONSUL ET LE CONFIG SERVER POUR LES TESTS
# Comme \u00E7a, je peux lancer mes tests m\u00EAme si mon Docker est \u00E9teint
spring.cloud.consul.enabled=false
spring.cloud.config.enabled=false